<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="100%" stop-color="#FFA751" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a4d7a" />
      <stop offset="100%" stop-color="#0d2b45" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glass/Metal Ring -->
  <circle cx="256" cy="256" r="230" fill="url(#blue-grad)" stroke="url(#gold-grad)" stroke-width="12" filter="url(#glow)" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
  
  <!-- Dashed Inner Accent Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gold-grad)" stroke-width="3" stroke-dasharray="10 15" opacity="0.8" />

  <!-- Monogram Logo Mark: stylized A, K, T combined as an elegant geometric symbol -->
  <!-- A central pillar / graph symbolizing financial growth and tax stability -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Shield / Foundation background -->
    <path d="M256 40 L450 120 L450 300 C450 420 256 490 256 490 C256 490 62 420 62 300 L62 120 Z" fill="none" stroke="url(#gold-grad)" stroke-width="16" stroke-linejoin="round" />
    
    <!-- Stylized Monogram / Pillars representing 'A', 'K', 'T' -->
    <!-- Left vertical bar (A/K leg) -->
    <rect x="160" y="160" width="35" height="200" rx="8" fill="url(#gold-grad)" />
    <!-- Right vertical bar (K leg) -->
    <rect x="317" y="160" width="35" height="200" rx="8" fill="url(#gold-grad)" />
    <!-- T-bar Top -->
    <rect x="130" y="120" width="252" height="35" rx="8" fill="url(#gold-grad)" />
    
    <!-- Diagonal connector for 'A' crossbar and 'K' branches -->
    <path d="M195 240 L317 160" stroke="url(#gold-grad)" stroke-width="32" stroke-linecap="round" />
    <path d="M195 260 L317 360" stroke="url(#gold-grad)" stroke-width="32" stroke-linecap="round" />
  </g>

  <!-- Small star accent at the top -->
  <path d="M256 70 L261 85 L276 85 L264 94 L268 109 L256 100 L244 109 L248 94 L236 85 L251 85 Z" fill="url(#gold-grad)" />
</svg>
